name: Regenerate Clippy Quips

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate-quips:
    name: Regenerate from HackerNews
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate fresh quips
        run: npm run generate:clippy-quips
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

      - name: Check if quips changed
        id: check-changes
        run: |
          if git diff --quiet src/data/clippy-quips.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and open PR
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          BRANCH="chore/clippy-quips-$(date +%Y%m%d)"
          git config --local user.email "action@github.com"
          git config --local user.name "Clippy Quips Bot"
          git checkout -b "$BRANCH"
          git add src/data/clippy-quips.json
          git commit \
            -m "chore: regenerate Clippy quips from HackerNews" \
            -m "Generated fresh AI-themed quips from trending HackerNews stories. Auto-generated by clippy-quips-refresh workflow."
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: regenerate Clippy quips from HackerNews" \
            --body "Automated weekly quip refresh from trending HackerNews stories.")
          gh pr review "$PR_URL" --approve
          gh pr merge "$PR_URL" --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log summary
        run: |
          echo "✅ Clippy quips workflow completed"
          if [ "${{ steps.check-changes.outputs.changed }}" == "true" ]; then
            echo "📝 Quips were regenerated and committed"
          else
            echo "📝 Quips were unchanged"
          fi

name: Post-Merge Verification

on:
  push:
    branches: [main, feat/initial-site-build]

permissions:
  contents: read
  issues: write

jobs:
  verify-main:
    name: Verify Main Branch
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Build project
        run: npm run build

      - name: Run all tests
        run: npm run test:all

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-merge-playwright-report
          path: playwright-report/
          retention-days: 30

      # Failure is the only thing that should reach a human. On a red main-branch
      # run, open (or comment on) a dedicated issue so it surfaces as one genuine,
      # actionable alert rather than another success email in the pile.
      - name: Open failure alert issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'ci-failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Post-Merge Verification failed on \`main\`.`,
              ``,
              `- Commit: ${context.sha}`,
              `- Run: ${runUrl}`,
              ``,
              `**Do not deploy until this is green.** Check the run for the failing step, then rollback or hotfix.`,
            ].join('\n');

            // Dedup: if an alert is already open, comment on it instead of stacking new issues.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Failed again — ${context.sha}\n${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Post-Merge Verification failed on main',
                labels: [label],
                body,
              });
            }

      - name: Fail the job
        if: failure()
        run: exit 1
